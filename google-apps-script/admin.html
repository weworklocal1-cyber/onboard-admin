<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LocalWala Admin</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f1f5f9;
      margin: 0;
      padding: 24px;
      color: #0f172a;
    }
    h1 {
      margin: 0 0 4px;
      font-size: 22px;
    }
    .subtitle {
      color: #64748b;
      font-size: 13px;
      margin-bottom: 24px;
    }
    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .tab {
      padding: 8px 16px;
      border-radius: 999px;
      border: 1px solid #e2e8f0;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: #475569;
    }
    .tab.active {
      background: #0f172a;
      color: #fff;
      border-color: #0f172a;
    }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .count {
      font-size: 12px;
      color: #64748b;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
    }
    thead th {
      background: #f8fafc;
      padding: 10px 12px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: #475569;
      border-bottom: 1px solid #e2e8f0;
      white-space: nowrap;
    }
    tbody td {
      padding: 10px 12px;
      font-size: 13px;
      border-bottom: 1px solid #f1f5f9;
      max-width: 320px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #f8fafc; }
    .empty {
      text-align: center;
      padding: 24px;
      color: #94a3b8;
      font-size: 13px;
    }
    .error {
      color: #dc2626;
      font-size: 13px;
      padding: 8px 0;
    }
  </style>
</head>
<body>
  <h1>LocalWala Admin</h1>
  <div class="subtitle">Manage leads from restaurant partners, delivery partners, careers &amp; contact</div>

  <div class="tabs" id="tabs"></div>

  <div class="toolbar">
    <div class="count" id="count"></div>
    <button class="tab" id="refresh" onclick="loadActiveSheet()">↻ Refresh</button>
  </div>

  <div style="overflow-x:auto">
    <table>
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <script>
    const SHEETS = ["restaurant_partners", "delivery_partners", "careers", "contact_leads"];
    let activeSheet = SHEETS[0];

    function renderTabs() {
      const container = document.getElementById("tabs");
      container.innerHTML = "";
      SHEETS.forEach(name => {
        const btn = document.createElement("button");
        btn.className = "tab" + (name === activeSheet ? " active" : "");
        btn.textContent = name.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
        btn.onclick = () => {
          activeSheet = name;
          renderTabs();
          loadActiveSheet();
        };
        container.appendChild(btn);
      });
    }

    function renderTable(rows) {
      const thead = document.getElementById("thead");
      const tbody = document.getElementById("tbody");
      const count = document.getElementById("count");

      tbody.innerHTML = "";
      thead.innerHTML = "";

      if (!rows || rows.length === 0) {
        count.textContent = "0 rows";
        tbody.innerHTML = '<tr><td colspan="100" class="empty">No data yet</td></tr>';
        return;
      }

      const columns = Object.keys(rows[0]);
      count.textContent = `${rows.length} row${rows.length === 1 ? "" : "s"}`;

      const trHead = document.createElement("tr");
      columns.forEach(col => {
        const th = document.createElement("th");
        th.textContent = col;
        trHead.appendChild(th);
      });
      thead.appendChild(trHead);

      rows.forEach(row => {
        const tr = document.createElement("tr");
        columns.forEach(col => {
          const td = document.createElement("td");
          td.textContent = row[col] == null ? "" : row[col];
          td.title = String(row[col] || "");
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
    }

    function loadActiveSheet() {
      document.getElementById("tbody").innerHTML =
        '<tr><td colspan="100" class="empty">Loading...</td></tr>';
      document.getElementById("error") && (document.getElementById("error").textContent = "");

      google.script.run
        .withSuccessHandler(renderTable)
        .withFailureHandler(err => {
          document.getElementById("tbody").innerHTML =
            '<tr><td colspan="100" class="error">' + (err.message || err) + "</td></tr>";
        })
        .getSheetData(activeSheet);
    }

    renderTabs();
    loadActiveSheet();
  </script>
</body>
</html>
